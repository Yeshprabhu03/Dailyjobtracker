name: Daily Job Monitor

on:
  schedule:
    # Runs every day at 7:00 AM EST (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-generativeai python-dotenv sendgrid

      - name: Restore seen job IDs cache
        uses: actions/cache@v4
        with:
          path: seen_job_ids.json
          key: seen-job-ids-${{ github.run_id }}
          restore-keys: |
            seen-job-ids-

      - name: Run job monitor
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
          SENDGRID_API_KEY:   ${{ secrets.SENDGRID_API_KEY }}
        run: python job_monitor.py

      - name: Commit updated jobs.json to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.json seen_job_ids.json 2>/dev/null || echo "No files to add"
          git commit -m "Automated job scrape update" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: Save seen job IDs
        uses: actions/cache@v4
        with:
          path: seen_job_ids.json
          key: seen-job-ids-${{ github.run_id }}
