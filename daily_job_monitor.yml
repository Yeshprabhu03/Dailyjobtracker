name: Daily Job Monitor

on:
  schedule:
    - cron: '0 2 * * *'    # 9 PM EST (2 AM UTC) daily
  workflow_dispatch:        # manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fixes Node.js 20 deprecation warning

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed for git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests gspread google-auth \
            google-genai python-dotenv sendgrid \
            beautifulsoup4 lxml

      - name: Restore seen job IDs cache
        uses: actions/cache@v4
        with:
          path: seen_job_ids.json
          key: seen-job-ids-${{ github.run_id }}
          restore-keys: |
            seen-job-ids-

      - name: Write Google credentials file
        run: echo '${{ secrets.GOOGLE_CREDS_JSON }}' > creds.json

      - name: Configure git identity
        run: |
          git config user.email "action@github.com"
          git config user.name "Job Monitor Bot"

      - name: Run job monitor
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEETS_ID:  ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_CREDS_JSON: creds.json
          ALERT_EMAIL:       ${{ secrets.ALERT_EMAIL }}
          SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
        run: python job_monitor.py

      - name: Save updated seen job IDs to cache
        uses: actions/cache@v4
        with:
          path: seen_job_ids.json
          key: seen-job-ids-${{ github.run_id }}
