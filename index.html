<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireScope // Executive Job Radar</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="blob-bg"></div>
  <div class="blob-bg blob-2"></div>

  <div class="app-container">
    <header class="glass-header">
      <div class="header-left">
        <h1>HireScope <span class="accent">Radar</span></h1>
        <p>AI-Scored Product Management Opportunities &bull; <span id="lastUpdated" style="color:var(--accent);font-weight:600;">Updating...</span></p>
      </div>
      <div class="header-right">
        <input type="text" id="searchBar" class="glass-input" placeholder="Search companies or titles..." />
        <select id="filterScore" class="glass-select">
          <option value="all">All Scores</option>
          <option value="70">Match ≥ 70</option>
          <option value="80">Match ≥ 80</option>
          <option value="90">Match ≥ 90</option>
        </select>
        <button id="filterApply" class="glass-btn">🔥 Apply Now</button>
      </div>
    </header>

    <main id="companyList" class="company-list">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Syncing Latest Jobs...</p>
      </div>
    </main>
  </div>

  <script>
    let allJobs = [];

    async function loadJobs() {
      try {
        const response = await fetch('./jobs.json');
        if (!response.ok) throw new Error("Could not find jobs.json");
        allJobs = await response.json();
        
        if (allJobs.length > 0) {
          const dates = allJobs.map(j => new Date(j.fetch_date || 0).getTime());
          const lastDate = new Date(Math.max(...dates));
          document.getElementById('lastUpdated').innerText = `Last Scanned: ${lastDate.toLocaleString(undefined, {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'})}`;
        }
        
        renderCompanies(allJobs);
      } catch (error) {
        document.getElementById('companyList').innerHTML = `<div class="error-state"><h2>Welcome to HireScope</h2><p>The automated GitHub Actions scanner is currently running. Jobs will appear here once JSON is updated!</p></div>`;
      }
    }

    function renderCompanies(jobsToRender) {
      const container = document.getElementById('companyList');
      container.innerHTML = '';
      if (jobsToRender.length === 0) {
        container.innerHTML = `<div class="error-state"><p>No jobs match your current filters.</p></div>`;
        return;
      }
      
      const grouped = {};
      jobsToRender.forEach(job => {
        if (!grouped[job.company]) grouped[job.company] = [];
        grouped[job.company].push(job);
      });

      const sortedCompanies = Object.keys(grouped).sort((a, b) => {
          const maxScoreA = Math.max(...grouped[a].map(j => j.score || 0));
          const maxScoreB = Math.max(...grouped[b].map(j => j.score || 0));
          return maxScoreB - maxScoreA;
      });

      sortedCompanies.forEach(companyName => {
        const companyJobs = grouped[companyName];
        
        const companyEl = document.createElement('div');
        companyEl.className = 'company-section glass-panel';
        
        const maxScore = Math.max(...companyJobs.map(j => j.score || 0));
        let scoreColor = maxScore >= 80 ? 'text-green' : (maxScore >= 60 ? 'text-yellow' : 'text-red');
        const hasApplyNow = companyJobs.some(j => j.apply_now);
        const applyBadge = hasApplyNow ? '🔥' : '';
        
        const headerHTML = `
          <div class="company-header" onclick="this.parentElement.classList.toggle('expanded')">
            <div class="company-info">
              <h2>${companyName} <span style="font-size:1rem;">${applyBadge}</span></h2>
              <span class="job-count">${companyJobs.length} match${companyJobs.length !== 1 ? 'es' : ''}</span>
            </div>
            <div class="company-actions">
              <div class="score-ring ${scoreColor}">${maxScore}<small>Max</small></div>
              <svg class="chevron" viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
          </div>
        `;
        
        let jobsHTML = `
          <div class="jobs-container">
            <table class="jobs-table">
              <thead>
                <tr>
                  <th width="70">Score</th>
                  <th width="28%">Role & Location</th>
                  <th width="52%">AI Rationale</th>
                  <th width="100" style="text-align:right;">Action</th>
                </tr>
              </thead>
              <tbody>
        `;
        
        companyJobs.forEach(job => {
           let jColor = job.score >= 80 ? 'text-green' : (job.score >= 60 ? 'text-yellow' : 'text-red');
           jobsHTML += `
                <tr>
                  <td class="job-score ${jColor}">${job.score}</td>
                  <td>
                    <div class="job-title">${job.title}</div>
                    <div class="job-meta">${job.location || 'Remote'} &bull; ${job.posted_date || 'Recent'}</div>
                  </td>
                  <td class="job-reason">${job.match_reason}</td>
                  <td style="text-align:right;">
                    <a href="${job.url}" target="_blank" class="glow-btn small-btn">Apply →</a>
                  </td>
                </tr>
           `;
        });
        
        jobsHTML += '</tbody></table></div>';
        
        companyEl.innerHTML = headerHTML + jobsHTML;
        container.appendChild(companyEl);
      });
    }

    let isApplyNowFilter = false;
    document.getElementById('searchBar').addEventListener('input', applyFilters);
    document.getElementById('filterScore').addEventListener('change', applyFilters);
    document.getElementById('filterApply').addEventListener('click', (e) => {
      isApplyNowFilter = !isApplyNowFilter;
      e.target.classList.toggle('active', isApplyNowFilter);
      applyFilters();
    });

    function applyFilters() {
      const query = document.getElementById('searchBar').value.toLowerCase();
      const scoreThresh = parseInt(document.getElementById('filterScore').value) || 0;
      
      const filtered = allJobs.filter(job => {
        const matchesQuery = job.company.toLowerCase().includes(query) || job.title.toLowerCase().includes(query);
        const matchesScore = job.score >= scoreThresh;
        const matchesApply = isApplyNowFilter ? job.apply_now === true : true;
        return matchesQuery && matchesScore && matchesApply;
      });
      renderCompanies(filtered);
    }

    loadJobs();
  </script>
</body>
</html>
